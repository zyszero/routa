      parameters:
        - name: repoPath
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Git refs grouped by head, local, remote, and tags
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GitRefsResult"
        "400":
          description: Missing repo path or invalid git repository
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to enumerate refs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/git/log:
    get:
      operationId: getGitLogPage
      summary: List git commit history for a local repository
      parameters:
        - name: repoPath
          in: query
          required: true
          schema:
            type: string
        - name: branches
          in: query
          description: Comma-separated branch or ref filters
          schema:
            type: string
        - name: search
          in: query
          description: Case-insensitive match against sha, summary, and author identity
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 40
            maximum: 200
        - name: skip
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        "200":
          description: Paged git log results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GitLogPage"
        "400":
          description: Missing repo path or invalid git repository
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to compute git log page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

