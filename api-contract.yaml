        "400":
          description: Missing or invalid request parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to read commit details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── GitHub Virtual Workspace ──
  /api/github:
    get:
      operationId: listGitHubWorkspaces
      summary: List active GitHub virtual workspaces
      responses:
        "200":
          description: Active workspaces
          content:
            application/json:
              schema:
                type: object
                properties:
                  workspaces:
                    type: array
                    items:
                      type: object
                      properties:
                        key:
                          type: string
                        owner:
                          type: string
                        repo:
                          type: string
                        ref:
                          type: string
                        fileCount:
                          type: integer
                        importedAt:
                          type: string
                          format: date-time
                        expiresAt:
                          type: string
                          format: date-time

  /api/github/import:
    post:
      operationId: importGitHubRepo
      summary: Import a GitHub repo as a virtual workspace (zipball download)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                owner:
                  type: string
                repo:
                  type: string
                ref:
                  type: string
                  description: Branch, tag, or SHA. Defaults to HEAD.
                url:
                  type: string
                  description: Shorthand — GitHub URL (parsed into owner/repo)
      responses:
        "200":
          description: Import successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  owner:
                    type: string
                  repo:
                    type: string
                  ref:
                    type: string
                  fileCount:
                    type: integer
                  extractedPath:
                    type: string
                  importedAt:
                    type: string
                    format: date-time
        "404":
          description: Repository not found
        "403":
          description: Rate limited or forbidden
        "413":
          description: Repository too large

  /api/github/issues:
    get:
      operationId: listGitHubIssues
      summary: List GitHub issues for a workspace codebase
      parameters:
        - name: workspaceId
          in: query
          required: true
          schema:
            type: string
        - name: codebaseId
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
            enum: [open, closed, all]
      responses:
        "200":
          description: GitHub issues
          content:
            application/json:
              schema:
                type: object
                properties:
                  repo:
                    type: string
                  codebase:
                    type: object
                    properties:
                      id:
                        type: string
                      label:
                        type: string
                  issues:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        number:
                          type: integer
                        title:
                          type: string
                        body:
                          type: string
                        url:
                          type: string
                        state:
                          type: string
                        labels:
                          type: array
                          items:
                            type: string
                        assignees:
                          type: array
                          items:
                            type: string
                        updatedAt:
                          type: string
        "400":
          description: Missing workspace or non-GitHub codebase
        "404":
          description: Workspace codebase not found
        "502":
          description: GitHub upstream request failed

  /api/github/pulls:
    get:
      operationId: listGitHubPulls
      summary: List GitHub pull requests for a workspace codebase
      parameters:
        - name: workspaceId
          in: query
          required: true
          schema:
            type: string
        - name: codebaseId
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
            enum: [open, closed, all]
      responses:
        "200":
          description: GitHub pull requests
        "400":
          description: Missing workspace or non-GitHub codebase
        "404":
          description: Workspace codebase not found
        "502":
          description: GitHub upstream request failed

