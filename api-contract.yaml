        - Current session details
        - Parent session (if exists)
        - Child sessions
        - Sibling sessions (same parent)
        - Recent sessions in the same workspace
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session context
          content:
            application/json:
              schema:
                type: object
                properties:
                  current:
                    type: object
                  parent:
                    type: object
                  children:
                    type: array
                    items:
                      type: object
                  siblings:
                    type: array
                    items:
                      type: object
                  recentInWorkspace:
                    type: array
                    items:
                      type: object
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

