openapi: 3.1.0
info:
  title: Routa.js API Contract
  description: |
    Single source of truth for the Routa.js dual-backend API.
    Both the Next.js backend (src/app/api/) and the Rust backend (crates/routa-server/)
    MUST implement all endpoints defined here with compatible request/response shapes.
  version: 0.1.0

servers:
  - url: http://localhost:3000
    description: Next.js backend (dev)
  - url: http://localhost:3210
    description: Rust backend (desktop)

# ─────────────────────────────────────────────────────────
# Shared component schemas
# ─────────────────────────────────────────────────────────
components:
  schemas:
    # ── Enums ──
    AgentRole:
      type: string
      enum: [ROUTA, CRAFTER, GATE, DEVELOPER]

    ModelTier:
      type: string
      enum: [SMART, BALANCED, FAST]

    AgentStatus:
      type: string
      enum: [PENDING, ACTIVE, COMPLETED, ERROR, CANCELLED]

    TaskStatus:
      type: string
      enum: [PENDING, IN_PROGRESS, REVIEW_REQUIRED, COMPLETED, NEEDS_FIX, BLOCKED, CANCELLED]

    ArtifactType:
      type: string
      enum: [screenshot, test_results, code_diff, logs]

    ArtifactStatus:
      type: string
      enum: [pending, provided, expired]

    VerificationVerdict:
      type: string
      enum: [APPROVED, NOT_APPROVED, BLOCKED]

    ReviewConfigSnippet:
      type: object
      required: [path, content]
      properties:
        path:
          type: string
        content:
          type: string

    HistoricalRelatedFile:
      type: object
      required: [path, score, sourceFiles, relatedCommits]
      properties:
        path:
          type: string
        score:
          type: number
        sourceFiles:
          type: array
          items:
            type: string
        relatedCommits:
          type: array
          items:
            type: string

    ReviewAnalysisPayload:
      type: object
      required: [repoPath, repoRoot, base, head, changedFiles, diffStat, diff, configSnippets]
      properties:
        repoPath:
          type: string
        repoRoot:
          type: string
        base:
          type: string
        head:
          type: string
        changedFiles:
          type: array
          items:
            type: string
        diffStat:
          type: string
        diff:
          type: string
        configSnippets:
          type: array
          items:
            $ref: "#/components/schemas/ReviewConfigSnippet"
        reviewRules:
          type: string
        historicalRelatedFiles:
          type: array
          items:
            $ref: "#/components/schemas/HistoricalRelatedFile"

    ReviewRawPhaseOutput:
      type: object
      required: [context, candidates, validated]
      properties:
        context:
          type: string
        candidates:
          type: string
        validated:
          type: string

    ReviewAnalyzeRequest:
      type: object
      properties:
        repoPath:
          type: string
        base:
          type: string
        head:
          type: string
        rulesFile:
          type: string
        model:
          type: string

    ReviewAnalyzeResponse:
      type: object
      required: [payload, context, candidates, validated, raw]
      properties:
        payload:
          $ref: "#/components/schemas/ReviewAnalysisPayload"
        context:
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items: {}
            - type: string
            - type: number
            - type: boolean
            - type: "null"
        candidates:
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items: {}
            - type: string
            - type: number
            - type: boolean
            - type: "null"
        validated:
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items: {}
            - type: string
            - type: number
            - type: boolean
            - type: "null"
        raw:
          $ref: "#/components/schemas/ReviewRawPhaseOutput"

    TaskPriority:
      type: string
      enum: [low, medium, high, urgent]

    NoteType:
      type: string
      enum: [spec, task, general]

    WorkspaceStatus:
      type: string
      enum: [active, archived]

    CodebaseSourceType:
      type: string
      enum: [local, github]

    VirtualFileEntry:
      type: object
      required: [path, name, isDirectory]
      properties:
        path:
          type: string
        name:
          type: string
        isDirectory:
          type: boolean
        size:
          type: integer
        children:
          type: array
          items:
            $ref: "#/components/schemas/VirtualFileEntry"

    GitRefKind:
      type: string
      enum: [head, local, remote, tag]

    GitLogRef:
      type: object
      required: [name, kind, commitSha]
      properties:
        name:
          type: string
        remote:
          type: string
        kind:
          $ref: "#/components/schemas/GitRefKind"
        commitSha:
          type: string
        isCurrent:
          type: boolean

    GitGraphEdge:
      type: object
      required: [fromLane, toLane]
      properties:
        fromLane:
          type: integer
        toLane:
          type: integer
        isMerge:
          type: boolean

    GitLogCommit:
      type: object
      required: [sha, shortSha, message, summary, authorName, authorEmail, authoredAt, parents, refs]
      properties:
        sha:
          type: string
        shortSha:
          type: string
        message:
          type: string
        summary:
          type: string
        authorName:
          type: string
        authorEmail:
          type: string
        authoredAt:
          type: string
          format: date-time
        parents:
          type: array
          items:
            type: string
        refs:
          type: array
          items:
            $ref: "#/components/schemas/GitLogRef"
        lane:
          type: integer
        graphEdges:
          type: array
          items:
            $ref: "#/components/schemas/GitGraphEdge"

    GitLogPage:
      type: object
      required: [commits, total, hasMore]
      properties:
        commits:
          type: array
          items:
            $ref: "#/components/schemas/GitLogCommit"
        total:
          type: integer
        hasMore:
          type: boolean

    GitRefsResult:
      type: object
      required: [local, remote, tags]
      properties:
        head:
          $ref: "#/components/schemas/GitLogRef"
        local:
          type: array
          items:
            $ref: "#/components/schemas/GitLogRef"
        remote:
          type: array
          items:
            $ref: "#/components/schemas/GitLogRef"
        tags:
          type: array
          items:
            $ref: "#/components/schemas/GitLogRef"

    GitCommitFileChangeKind:
      type: string
      enum: [added, modified, deleted, renamed, copied]

    GitCommitFileChange:
      type: object
      required: [path, status, additions, deletions]
      properties:
        path:
          type: string
        previousPath:
          type: string
        status:
          $ref: "#/components/schemas/GitCommitFileChangeKind"
        additions:
          type: integer
        deletions:
          type: integer

    GitCommitDetail:
      type: object
      required: [commit, files]
      properties:
        commit:
          $ref: "#/components/schemas/GitLogCommit"
        files:
          type: array
          items:
            $ref: "#/components/schemas/GitCommitFileChange"
        patch:
          type: string

    # ── Models ──
    Agent:
      type: object
      required: [id, name, role, modelTier, workspaceId, status, createdAt, updatedAt, metadata]
      properties:
        id:
          type: string
        name:
          type: string
        role:
          $ref: "#/components/schemas/AgentRole"
        modelTier:
          $ref: "#/components/schemas/ModelTier"
        workspaceId:
          type: string
        parentId:
          type: string
        status:
          $ref: "#/components/schemas/AgentStatus"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties:
            type: string

    Task:
      type: object
      required: [id, title, objective, status, dependencies, workspaceId, createdAt, updatedAt]
      properties:
        id:
          type: string
        title:
          type: string
        objective:
          type: string
        scope:
          type: string
        acceptanceCriteria:
          type: array
          items:
            type: string
        verificationCommands:
          type: array
          items:
            type: string
        assignedTo:
          type: string
        status:
          $ref: "#/components/schemas/TaskStatus"
        boardId:
          type: string
        columnId:
          type: string
        position:
          type: integer
        priority:
          $ref: "#/components/schemas/TaskPriority"
        labels:
          type: array
          items:
            type: string
        assignee:
          type: string
        assignedProvider:
          type: string
        assignedRole:
          $ref: "#/components/schemas/AgentRole"
        assignedSpecialistId:
          type: string
        assignedSpecialistName:
          type: string
        triggerSessionId:
          type: string
        githubId:
          type: string
        githubNumber:
          type: integer
        githubUrl:
          type: string
        githubRepo:
          type: string
        githubState:
          type: string
        githubSyncedAt:
          type: string
          format: date-time
        lastSyncError:
          type: string
        dependencies:
          type: array
          items:
            type: string
        parallelGroup:
          type: string
        workspaceId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        completionSummary:
          type: string
        verificationVerdict:
          $ref: "#/components/schemas/VerificationVerdict"
        verificationReport:
          type: string

    Artifact:
      type: object
      required: [id, type, taskId, status, workspaceId, createdAt, updatedAt]
      properties:
        id:
          type: string
        type:
          $ref: "#/components/schemas/ArtifactType"
        taskId:
          type: string
        providedByAgentId:
          type: string
        requestedByAgentId:
          type: string
        requestId:
          type: string
        content:
          type: string
        context:
          type: string
        status:
          $ref: "#/components/schemas/ArtifactStatus"
        workspaceId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties:
            type: string

    KanbanColumnAutomation:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean
        providerId:
          type: string
        role:
          type: string
        specialistId:
          type: string
        specialistName:
          type: string
        transitionType:
          type: string
          enum: [entry, exit, both]
        requiredArtifacts:
          type: array
          items:
            type: string
            enum: [screenshot, test_results, code_diff]
        autoAdvanceOnSuccess:
          type: boolean

    KanbanColumn:
      type: object
      required: [id, name, position, stage]
      properties:
        id:
          type: string
        name:
          type: string
        color:
          type: string
        position:
          type: integer
        stage:
          type: string
        automation:
          $ref: "#/components/schemas/KanbanColumnAutomation"

    KanbanBoard:
      type: object
      required: [id, workspaceId, name, isDefault, columns, createdAt, updatedAt]
      properties:
        id:
          type: string
        workspaceId:
          type: string
        name:
          type: string
        isDefault:
          type: boolean
        columns:
          type: array
          items:
            $ref: "#/components/schemas/KanbanColumn"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    NoteMetadata:
      type: object
      required: [type]
      properties:
        type:
          $ref: "#/components/schemas/NoteType"
        taskStatus:
          $ref: "#/components/schemas/TaskStatus"
        assignedAgentIds:
          type: array
          items:
            type: string
        parentNoteId:
          type: string
        linkedTaskId:
          type: string
        custom:
          type: object
          additionalProperties:
            type: string

    Note:
      type: object
      required: [id, title, content, workspaceId, metadata, createdAt, updatedAt]
      properties:
        id:
          type: string
        title:
          type: string
        content:
          type: string
        workspaceId:
          type: string
        metadata:
          $ref: "#/components/schemas/NoteMetadata"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Workspace:
      type: object
      required: [id, title, status, metadata, createdAt, updatedAt]
      properties:
        id:
          type: string
        title:
          type: string
        repoPath:
          type: string
        branch:
          type: string
        status:
          $ref: "#/components/schemas/WorkspaceStatus"
        metadata:
          type: object
          additionalProperties:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SharedSessionRole:
      type: string
      enum: [host, collaborator, viewer]

    SharedSessionMode:
      type: string
      enum: [view_only, comment_only, prompt_with_approval, prompt_direct]

    SharedSessionStatus:
      type: string
      enum: [active, closed, expired]

    SharedPromptStatus:
      type: string
      enum: [pending, approved, rejected, failed]

    SharedSession:
      type: object
      required:
        [id, workspaceId, hostUserId, hostSessionId, mode, approvalRequired, inviteToken, createdAt, status]
      properties:
        id:
          type: string
        workspaceId:
          type: string
        hostUserId:
          type: string
        hostSessionId:
          type: string
        mode:
          $ref: "#/components/schemas/SharedSessionMode"
        approvalRequired:
          type: boolean
        inviteToken:
          type: string
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        status:
          $ref: "#/components/schemas/SharedSessionStatus"

    SharedSessionParticipant:
      type: object
      required: [id, sharedSessionId, userId, role, joinedAt]
      properties:
        id:
          type: string
        sharedSessionId:
          type: string
        userId:
          type: string
        displayName:
          type: string
        role:
          $ref: "#/components/schemas/SharedSessionRole"
        joinedAt:
          type: string
          format: date-time
        leftAt:
          type: string
          format: date-time

    SharedSessionParticipantWithToken:
      allOf:
        - $ref: "#/components/schemas/SharedSessionParticipant"
        - type: object
          required: [accessToken]
          properties:
            accessToken:
              type: string

    SharedSessionMessage:
      type: object
      required: [id, sharedSessionId, participantId, authorUserId, kind, text, createdAt]
      properties:
        id:
          type: string
        sharedSessionId:
          type: string
        participantId:
          type: string
        authorUserId:
          type: string
        kind:
          type: string
          enum: [comment, prompt, system]
        text:
          type: string
        createdAt:
          type: string
          format: date-time
        approvalId:
          type: string

    SharedPromptApproval:
      type: object
      required: [id, sharedSessionId, participantId, prompt, status, createdAt]
      properties:
        id:
          type: string
        sharedSessionId:
          type: string
        participantId:
          type: string
        prompt:
          type: string
        status:
          $ref: "#/components/schemas/SharedPromptStatus"
        createdAt:
          type: string
          format: date-time
        resolvedAt:
          type: string
          format: date-time
        resolvedByParticipantId:
          type: string
        errorMessage:
          type: string

    # ── Common Response Shapes ──
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    DeletedResponse:
      type: object
      required: [deleted]
      properties:
        deleted:
          type: boolean
          const: true

    GraphNode:
      type: object
      required: [id, path, language, kind]
      properties:
        id:
          type: string
        path:
          type: string
        language:
          type: string
        kind:
          type: string
          enum:
            - file
            - external_crate
            - external_package
            - unresolved_module
            - package
            - class
            - interface
            - enum
            - method
            - field
            - constructor

    GraphEdge:
      type: object
      required: [from, to, kind, specifier, resolved]
      properties:
        from:
          type: string
        to:
          type: string
        kind:
          type: string
          enum: [uses, imports, made_of, depends_on, extends, implements]
        specifier:
          type: string
        resolved:
          type: boolean

    DependencyGraph:
      type: object
      required: [generated_at, root_dir, language, node_count, edge_count, nodes, edges]
      properties:
        generated_at:
          type: string
          format: date-time
        root_dir:
          type: string
        language:
          type: string
        node_count:
          type: integer
        edge_count:
          type: integer
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/GraphNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/GraphEdge"

    # ── Sandbox schemas ──
    SandboxInfo:
      type: object
      required: [id, name, status, lang, createdAt, lastActiveAt]
      properties:
        id:
          type: string
          description: Docker container ID
        name:
          type: string
          description: Docker container name
        status:
          type: string
          description: Container status (e.g. "running")
        lang:
          type: string
          description: Programming language (e.g. "python")
        port:
          type: integer
          description: Host port mapped to the in-sandbox server
        createdAt:
          type: string
          format: date-time
        lastActiveAt:
          type: string
          format: date-time

    CreateSandboxRequest:
      type: object
      required: [lang]
      properties:
        lang:
          type: string
          description: Language for the sandbox kernel (currently only "python")
          example: python
        policy:
          $ref: "#/components/schemas/SandboxPolicyInput"

    SandboxPolicyInput:
      type: object
      properties:
        workspaceId:
          type: string
        codebaseId:
          type: string
        workdir:
          type: string
        readOnlyPaths:
          type: array
          items:
            type: string
        readWritePaths:
          type: array
          items:
            type: string
        networkMode:
          type: string
          enum: [bridge, none]
        envMode:
          type: string
          enum: [sanitized, inherit]
        envFile:
          type: string
        envAllowlist:
          type: array
          items:
            type: string
        capabilities:
          type: array
          items:
            type: string
            enum: [workspaceRead, workspaceWrite, networkAccess, linkedWorktreeRead]
        linkedWorktreeMode:
          type: string
          enum: [disabled, all, explicit]
        linkedWorktreeIds:
          type: array
          items:
            type: string
        trustWorkspaceConfig:
          type: boolean

    SandboxPermissionConstraints:
      type: object
      properties:
        readOnlyPaths:
          type: array
          items:
            type: string
        readWritePaths:
          type: array
          items:
            type: string
        envFile:
          type: string
        envAllowlist:
          type: array
          items:
            type: string
        capabilities:
          type: array
          items:
            type: string
            enum: [workspaceRead, workspaceWrite, networkAccess, linkedWorktreeRead]
        networkMode:
          type: string
          enum: [bridge, none]
        linkedWorktreeMode:
          type: string
          enum: [disabled, all, explicit]
        linkedWorktreeIds:
          type: array
          items:
            type: string

    SandboxPermissionConstraintRequest:
      type: object
      required: [constraints]
      properties:
        constraints:
          $ref: "#/components/schemas/SandboxPermissionConstraints"

    SandboxPolicyExplainResponse:
      type: object
      required: [policy]
      properties:
        policy:
          type: object
          additionalProperties: true

    ExecuteRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          description: Source code to execute in the sandbox

    SandboxOutputEvent:
      type: object
      description: |
        A single streaming output event. Exactly one of text, image, or error
        will be present in each line of the NDJSON stream.
      properties:
        text:
          type: string
          description: Stdout output text
        image:
          type: string
          description: Base64-encoded PNG image
        error:
          type: string
          description: Error traceback

    Worktree:
      type: object
      required: [id, codebaseId, workspaceId, worktreePath, branch, baseBranch, status, createdAt, updatedAt]
      properties:
        id:
          type: string
        codebaseId:
          type: string
        workspaceId:
          type: string
        worktreePath:
          type: string
        branch:
          type: string
        baseBranch:
          type: string
        status:
          type: string
          enum: [creating, active, error, removing]
        sessionId:
          type: string
        label:
          type: string
        errorMessage:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

# ─────────────────────────────────────────────────────────
# API Paths
# ─────────────────────────────────────────────────────────
paths:
  # ── Health ──
  /api/health:
    get:
      operationId: getHealth
      summary: Health check — returns service status
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required: [status, timestamp]
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time

  # ── Agents ──
  /api/agents:
    get:
      operationId: listAgents
      summary: List agents (or get single by id query param)
      parameters:
        - name: id
          in: query
          schema:
            type: string
          description: If provided, returns single agent
        - name: workspaceId
          in: query
          schema:
            type: string
            default: "default"
        - name: role
          in: query
          schema:
            $ref: "#/components/schemas/AgentRole"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/AgentStatus"
        - name: parentId
          in: query
          schema:
            type: string
        - name: summary
          in: query
          schema:
            type: string
          description: If present with id, returns agent summary (Next.js only)
      responses:
        "200":
          description: Agent list or single agent
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      agents:
                        type: array
                        items:
                          $ref: "#/components/schemas/Agent"
                  - $ref: "#/components/schemas/Agent"
    post:
      operationId: createAgent
      summary: Create a new agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, role]
              properties:
                name:
                  type: string
                role:
                  $ref: "#/components/schemas/AgentRole"
                workspaceId:
                  type: string
                  default: "default"
                parentId:
                  type: string
                modelTier:
                  $ref: "#/components/schemas/ModelTier"
      responses:
        "200":
          description: Created agent
          content:
            application/json:
              schema:
                type: object
                properties:
                  agentId:
                    type: string
                  agent:
                    $ref: "#/components/schemas/Agent"

  /api/agents/{id}:
    get:
      operationId: getAgent
      summary: Get agent by ID (REST-style path param)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Single agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "404":
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteAgent
      summary: Delete an agent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletedResponse"

  /api/agents/{id}/status:
    post:
      operationId: updateAgentStatus
      summary: Update agent status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
