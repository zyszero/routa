  # ── A2UI Dashboard ──
  /api/a2ui/dashboard:
    get:
      operationId: getA2UIDashboard
      summary: Get A2UI v0.10 dashboard data
      description: |
        Returns A2UI v0.10 messages for the workspace dashboard.
        Aggregates sessions, tasks, background tasks, traces, and custom surfaces.
      parameters:
        - name: workspaceId
          in: query
          schema:
            type: string
            default: "default"
          description: Workspace ID (defaults to 'default')
      responses:
        "200":
          description: A2UI dashboard data
          content:
            application/json:
              schema:
                type: object
                required: [data, kind]
                properties:
                  data:
                    type: array
                    description: Array of A2UI v0.10 messages
                    items:
                      type: object
                  kind:
                    type: string
                    const: "data"
                  metadata:
                    type: object
                    properties:
                      mimeType:
                        type: string
                        example: "application/json+a2ui"
        "500":
          description: Failed to generate A2UI dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: postA2UIDashboardMessage
      summary: Add custom A2UI messages to the dashboard
      description: |
        Accepts custom A2UI messages and stores them for the workspace.
        Messages are appended to the dashboard data.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [messages]
              properties:
                workspaceId:
                  type: string
                  default: "default"
                  description: Workspace ID to add messages to
                messages:
                  type: array
                  description: Custom A2UI v0.10 messages
                  items:
                    type: object
      responses:
        "200":
          description: Messages added successfully
          content:
            application/json:
              schema:
                type: object
        "500":
          description: Failed to store messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── AG-UI Protocol ──
  /api/ag-ui:
    post:
      operationId: postAGUI
      summary: Process AG-UI protocol request (SSE stream)
      description: |
        Implements the AG-UI protocol (https://docs.ag-ui.com).
        Accepts RunAgentInput and returns an SSE stream of AG-UI events.
        Bridges to the existing ACP session infrastructure for real-time updates.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [threadId, runId, messages]
              properties:
                threadId:
                  type: string
                  description: AG-UI thread ID (maps to ACP session)
                runId:
                  type: string
                  description: AG-UI run ID
                parentRunId:
                  type: string
                  description: Optional parent run ID for nested runs
                messages:
                  type: array
                  description: Message history
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                      role:
                        type: string
                        enum: [user, assistant, system]
                      content:
                        oneOf:
                          - type: string
                          - type: array
                            items:
                              type: object
                tools:
                  type: array
                  description: Available tools
                  items:
                    type: object
                context:
                  type: array
                  description: Additional context
                  items:
                    type: object
                state:
                  type: object
                  description: Optional state object
                forwardedProps:
                  type: object
                  description: Optional forwarded properties
      responses:
        "200":
          description: SSE stream of AG-UI events
          content:
            text/event-stream: {}
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

