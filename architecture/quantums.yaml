schema: architecture-quantums-v1

quantums:
  - id: nextjs_web
    description: Next.js web runtime and app-router surface
    roots:
      - src/app/**
      - src/client/**
      - src/core/**

  - id: rust_backend
    description: Rust local/server runtime and CLI surface
    roots:
      - crates/routa-core/**
      - crates/routa-server/**
      - crates/routa-cli/**
      - crates/routa-rpc/**

  - id: tools_fitness
    description: Rust fitness engine, loaders, policies, and CLI surface
    roots:
      - crates/entrix/**
