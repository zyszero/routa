schema: routa.archdsl/v1

model:
  id: backend_core
  title: Backend Core Architecture
  description: Boundary and cycle rules for Routa's TypeScript backend core.
  owners:
    - fitness
    - backend

defaults:
  root: .
  exclude:
    - "**/.git/**"
    - "**/.next/**"
    - "**/.worktrees/**"
    - "**/coverage/**"
    - "**/dist/**"
    - "**/node_modules/**"
    - "**/out/**"
    - "**/target/**"

selectors:
  core_ts:
    kind: files
    language: typescript
    description: Shared backend core modules.
    include:
      - src/core/**

  app_ts:
    kind: files
    language: typescript
    description: Next.js app surface, including API and UI shells.
    include:
      - src/app/**

  api_ts:
    kind: files
    language: typescript
    description: Next.js API route surface.
    include:
      - src/app/api/**

  client_ts:
    kind: files
    language: typescript
    description: Browser-only client surface.
    include:
      - src/client/**

rules:
  - id: ts_backend_core_no_core_to_app
    title: src/core must not depend on src/app
    message_key: fitness.architecture.rules.ts_backend_core_no_core_to_app.title
    kind: dependency
    suite: boundaries
    severity: advisory
    from: core_ts
    relation: must_not_depend_on
    to: app_ts
    engine_hints:
      - archunitts

  - id: ts_backend_core_no_core_to_client
    title: src/core must not depend on src/client
    message_key: fitness.architecture.rules.ts_backend_core_no_core_to_client.title
    kind: dependency
    suite: boundaries
    severity: advisory
    from: core_ts
    relation: must_not_depend_on
    to: client_ts
    engine_hints:
      - archunitts

  - id: ts_backend_core_no_api_to_client
    title: src/app/api must not depend on src/client
    message_key: fitness.architecture.rules.ts_backend_core_no_api_to_client.title
    kind: dependency
    suite: boundaries
    severity: advisory
    from: api_ts
    relation: must_not_depend_on
    to: client_ts
    engine_hints:
      - archunitts

  - id: ts_backend_core_no_cycles
    title: src/core should be cycle free
    message_key: fitness.architecture.rules.ts_backend_core_no_cycles.title
    kind: cycle
    suite: cycles
    severity: advisory
    scope: core_ts
    relation: must_be_acyclic
    engine_hints:
      - archunitts
