schema: harness-automation-v1
definitions:
  - id: long-file-refactor-window
    name: Long-file refactor window
    description: Queue oversized source files and batch them into the weekly refactor slot instead of fixing them immediately.
    source:
      type: finding
      findingType: long-file
      maxItems: 5
      deferUntilCron: "0 10 * * 1"
    target:
      type: workflow
      ref: refactor-window

  - id: weekly-harness-fluency
    name: Weekly harness fluency
    description: Re-run the harness fluency specialist on a weekly cadence and keep the result visible in Harness.
    source:
      type: schedule
      cron: "0 3 * * 1"
      timezone: UTC
    target:
      type: specialist
      ref: harness-test
    runtime:
      scheduleName: Weekly harness fluency

  - id: issue-gc-review
    name: Issue cleanup review
    description: Surface duplicate, stale, and unresolved docs/issues suspects in Harness before deciding whether to run issue garbage collection.
    source:
      type: finding
      findingType: issue-suspect
      maxItems: 12
      deferUntilCron: "0 9 * * 1"
    target:
      type: workflow
      ref: issue-garbage-collector
