id: core-home-session
goal: >
  从首页进入 workspace，选择 provider，提交 prompt，跳转到 session 详情页并验证可交互。
entry_url: "http://localhost:3000"
preconditions:
  - "至少存在一个 workspace"
  - "至少配置了一个 provider"
execution_notes:
  - "从首页进入 workspace 后，只完成 1 次 provider 选择和 1 次 prompt 提交，不要在多个 provider 之间来回切换。"
  - "prompt 使用简短且唯一的文本，便于在 session 页面核对，例如带时间戳的 `ui-journey core-home-session`。"
  - "成功跳转到 session 页面并看到 prompt 内容或活跃 session 信息后，就可以截图并结束，不要继续做无关探索。"
  - "对本场景而言，session 页顶部的 Session ID、`Stop` 按钮、禁用中的 provider 选择器，或 `Connect first...` 输入态，都算作可接受的活跃 session 信息；不需要继续等待 prompt 文本完全回显。"
observation_targets:
  - "首页到 workspace 的导航是否清晰"
  - "provider 选择控件、提交按钮、加载状态和错误提示"
  - "session 页面中的 prompt 内容、Session 标识、继续交互能力；如果 prompt 文本尚未回显，也要观察 session ID / Stop 按钮 / 输入框状态是否表明会话已活跃"
stop_conditions:
  - "如果已进入 session 页面，并能看到本次提交的 prompt 或明显的 Session 标识，就立即截图并结束。"
  - "如果 URL 已切到 `/workspace/.../sessions/<id>`，且页面同时出现 Session ID、`Stop` 按钮、禁用中的 provider 选择器或 `Connect first...` 这类活跃 session 证据中的任意一种，就立即截图并结束，不要再追加第二轮等待。"
  - "如果提交后仍停留在原页、出现白屏/500，或 10 秒内没有进入 session 详情页，就记录失败并结束。"
success_signals:
  - "成功跳转到 session 详情页"
  - "session 页面显示用户提交的 prompt 内容，或出现 Session ID / Stop 按钮 / 活跃输入框等明确的活跃 session 证据"
  - "页面可继续交互，无阻断性错误"
failure_signals:
  - "任何步骤出现页面白屏或 500 错误"
  - "提交 prompt 后未跳转"
  - "进入 session 页面后，既没有 prompt 内容，也没有 Session ID、Stop 按钮或其他活跃 session 证据"
score_rubric: |
  重点关注：
  1. 关键目标是否顺序完成
  2. 页面是否清晰引导
  3. 出错时恢复指引是否可理解
  4. 交互过程是否出现明显阻断
