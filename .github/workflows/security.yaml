# Security Scanning Pipeline
#
# 多层安全扫描实现深度防御：
#   - 依赖扫描: npm audit, cargo audit
#   - SAST: Semgrep (社区规则 + OWASP Top 10)
#   - 容器扫描: Trivy
#   - Dockerfile: Hadolint
#
# 参考: https://github.com/phodal/routa/issues/132

name: 'Security'

on:
  pull_request:
    paths-ignore:
      - '*.md'
      - 'docs/**'
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
  schedule:
    # 每周一 UTC 00:00 运行
    - cron: '0 0 * * 1'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ══════════════════════════════════════════════════════════════
  # 依赖漏洞扫描
  # ══════════════════════════════════════════════════════════════
  dependency-scan:
    name: 'Dependency Scan'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: npm audit (critical)
        run: npm audit --audit-level=critical
        continue-on-error: false

      - name: npm audit (high) - report only
        run: npm audit --audit-level=high || true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: cargo audit
        run: cargo audit

  # ══════════════════════════════════════════════════════════════
  # Semgrep SAST 扫描
  # ══════════════════════════════════════════════════════════════
  semgrep:
    name: 'Semgrep SAST'
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep scan (security-audit + OWASP)
        run: |
          semgrep scan \
            --config=p/security-audit \
            --config=p/owasp-top-ten \
            --config=p/typescript \
            --config=p/javascript \
            --sarif \
            --output=semgrep-results.sarif \
            .
        continue-on-error: true

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep-results.sarif

      - name: Semgrep strict (ERROR only, fail on match)
        run: |
          semgrep scan \
            --config=p/security-audit \
            --config=p/owasp-top-ten \
            --severity=ERROR \
            --error \
            .

  # ══════════════════════════════════════════════════════════════
  # Trivy 文件系统扫描
  # ══════════════════════════════════════════════════════════════
  trivy:
    name: 'Trivy Scan'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ══════════════════════════════════════════════════════════════
  # Dockerfile 检查
  # ══════════════════════════════════════════════════════════════
  hadolint:
    name: 'Hadolint'
    runs-on: ubuntu-latest
    if: hashFiles('Dockerfile') != ''
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

  # ══════════════════════════════════════════════════════════════
  # 安全报告汇总
  # ══════════════════════════════════════════════════════════════
  security-summary:
    name: 'Security Summary'
    runs-on: ubuntu-latest
    needs: [dependency-scan, semgrep, trivy]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Scan | ${{ needs.dependency-scan.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Semgrep SAST | ${{ needs.semgrep.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy | ${{ needs.trivy.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY

