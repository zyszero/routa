name: Cargo Publish to crates.io

on:
  workflow_call:
    inputs:
      version:
        description: "Semver version to publish, ex: 0.2.4"
        required: true
        type: string
      dry_run:
        description: "Run cargo publish --dry-run only"
        required: false
        default: false
        type: boolean
  workflow_dispatch:
    inputs:
      version:
        description: "Semver version to publish, ex: 0.2.4 or v0.2.4"
        required: true
        type: string
      dry_run:
        description: "Run cargo publish --dry-run only"
        type: boolean
        default: false

jobs:
  publish-crates:
    name: Publish Rust crates to crates.io
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ inputs.version || github.event.inputs.version }}
      DRY_RUN: ${{ inputs.dry_run || github.event.inputs.dry_run }}
    steps:
      - uses: actions/checkout@v6

      - name: Sync release version
        shell: bash
        run: node scripts/release/sync-release-version.mjs --version "${RELEASE_VERSION}"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify versions
        run: |
          version="${RELEASE_VERSION}"
          version="${version#v}"
          workspace_version=$(grep '^\s*version = ' Cargo.toml | head -n1 | sed 's/.*"\(.*\)".*/\1/')

          echo "Checking crate versions..."
          for crate in crates/routa-core crates/routa-rpc crates/routa-scanner crates/routa-server crates/routa-cli crates/routa-entrix crates/harness-monitor; do
            if grep -q '^version\.workspace = true$' "$crate/Cargo.toml"; then
              crate_version="${workspace_version}"
            else
              crate_version=$(grep '^version = ' "$crate/Cargo.toml" | head -n1 | sed 's/version = "\(.*\)"/\1/')
            fi
            echo "$crate: $crate_version"
            if [[ "$crate_version" != "$version" ]]; then
              echo "ERROR: $crate version mismatch. Expected $version, got $crate_version" >&2
              exit 1
            fi
          done

      - name: Cargo login
        if: ${{ !inputs.dry_run && github.event.inputs.dry_run != 'true' && github.event.inputs.dry_run != true }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATE_TOKEN }}
        run: |
          if [[ -z "${CARGO_REGISTRY_TOKEN:-}" ]]; then
            echo "CRATE_TOKEN secret is required for publish" >&2
            exit 1
          fi
          cargo login "${CARGO_REGISTRY_TOKEN}"

      - name: Publish routa-core
        run: |
          cd crates/routa-core
          if [[ "$DRY_RUN" == "true" ]]; then
            cargo publish --dry-run
          else
            cargo publish --no-verify || echo "routa-core may already be published"
          fi

      - name: Publish routa-rpc
        run: |
          cd crates/routa-rpc
          if [[ "$DRY_RUN" == "true" ]]; then
            cargo publish --dry-run
          else
            cargo publish --no-verify || echo "routa-rpc may already be published"
          fi

      - name: Publish routa-scanner
        run: |
          cd crates/routa-scanner
          if [[ "$DRY_RUN" == "true" ]]; then
            cargo publish --dry-run
          else
            cargo publish --no-verify || echo "routa-scanner may already be published"
          fi

      - name: Publish routa-server
        run: |
          cd crates/routa-server
          if [[ "$DRY_RUN" == "true" ]]; then
            cargo publish --dry-run
          else
            cargo publish --no-verify || echo "routa-server may already be published"
          fi

      - name: Wait for crates.io index update
        if: ${{ !inputs.dry_run && github.event.inputs.dry_run != 'true' && github.event.inputs.dry_run != true }}
        run: sleep 30

      - name: Publish entrix
        run: |
          cd crates/routa-entrix
          if [[ "$DRY_RUN" == "true" ]]; then
            cargo publish --dry-run
          else
            cargo publish --no-verify || echo "entrix may already be published"
          fi

      - name: Wait for crates.io index update after entrix
        if: ${{ !inputs.dry_run && github.event.inputs.dry_run != 'true' && github.event.inputs.dry_run != true }}
        run: sleep 30

      - name: Publish routa-cli
        run: |
          cd crates/routa-cli
          if [[ "$DRY_RUN" == "true" ]]; then
            cargo publish --dry-run
          else
            cargo publish --no-verify || echo "routa-cli may already be published"
          fi

      - name: Publish harness-monitor
        run: |
          cd crates/harness-monitor
          if [[ "$DRY_RUN" == "true" ]]; then
            cargo publish --dry-run
          else
            cargo publish --no-verify || echo "harness-monitor may already be published"
          fi

      - name: Summary
        run: |
          version="${RELEASE_VERSION}"
          version="${version#v}"
          echo "## Cargo Publish Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Published version: **$version**" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Install via cargo:" >> "$GITHUB_STEP_SUMMARY"
          echo '```bash' >> "$GITHUB_STEP_SUMMARY"
          echo "cargo install routa-cli@$version" >> "$GITHUB_STEP_SUMMARY"
          echo "cargo install entrix@$version" >> "$GITHUB_STEP_SUMMARY"
          echo "cargo install harness-monitor@$version" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
