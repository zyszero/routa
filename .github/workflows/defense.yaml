# Defense-in-Depth CI Pipeline
#
# 摒弃传统针对 DX 的"宽容度"，用硬性约束封锁 AI 的乱写空间。
# 通过持续演进的架构约束实现深度防御：
#   - 控制爆炸半径：通过权限和行为约束限定 AI 的操作范围
#   - 反熵增机制：设立质量门槛与技术债检查，将 AI 的解空间限制在安全边界内
#
# Hard Gates（任一失败直接阻断）:
#   - ts_test_pass: TypeScript 测试必须 100% 通过
#   - rust_test_pass: Rust 测试必须 100% 通过
#   - api_contract_parity: API 契约必须一致
#   - lint_pass: Lint 必须 0 错误
#   - no_critical_vulnerabilities: 无严重安全漏洞

name: 'Defense'

on:
  pull_request:
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
  schedule:
    # 每周一 UTC 00:00 运行 security 维度
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  CARGO_TERM_COLOR: always
  NODE_ENV: test

jobs:
  # ══════════════════════════════════════════════════════════════
  # HARD GATE 1: Lint (反熵增 - 代码风格约束)
  # ══════════════════════════════════════════════════════════════
  lint:
    name: 'Gate: Lint'
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  # ══════════════════════════════════════════════════════════════
  # HARD GATE 2: TypeScript Tests (行为约束)
  # ══════════════════════════════════════════════════════════════
  test-ts:
    name: 'Gate: TS Tests'
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

  # ══════════════════════════════════════════════════════════════
  # HARD GATE 3: Rust Tests (行为约束)
  # ══════════════════════════════════════════════════════════════
  test-rust:
    name: 'Gate: Rust Tests'
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            patchelf

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace

  # ══════════════════════════════════════════════════════════════
  # HARD GATE 4: API Contract Parity (契约约束)
  # ══════════════════════════════════════════════════════════════
  api-contract:
    name: 'Gate: API Contract'
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate OpenAPI schema
        run: npm run api:schema:validate

      - name: Check API parity (Next.js vs Rust vs Contract)
        run: npm run api:check

  # ══════════════════════════════════════════════════════════════
  # Fitness Score Report (评分，不阻断)
  # ══════════════════════════════════════════════════════════════
  fitness-report:
    name: 'Fitness Report'
    runs-on: ubuntu-latest
    needs: [lint, test-ts, test-rust, api-contract]
    if: always() && github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install routa-fitness
        run: pip install -e tools/routa-fitness

      - name: Run fitness check
        id: fitness
        continue-on-error: true
        run: |
          mkdir -p .artifacts
          routa-fitness run --tier normal --scope ci --output .artifacts/fitness-report.json

      - name: Summary
        run: |
          echo "## Fitness Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Gate | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| TS Tests | ${{ needs.test-ts.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Rust Tests | ${{ needs.test-rust.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API Contract | ${{ needs.api-contract.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Fitness Engine | ${{ steps.fitness.outcome == 'success' && '✅' || '⚠️' }} |" >> $GITHUB_STEP_SUMMARY
          if [ -f .artifacts/fitness-report.json ]; then
            python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
import json
from pathlib import Path

payload = json.loads(Path(".artifacts/fitness-report.json").read_text(encoding="utf-8"))
print("")
print(f"- Final score: {payload.get('final_score', 0):.1f}")
print(f"- Hard gate blocked: {payload.get('hard_gate_blocked', False)}")
print(f"- Score blocked: {payload.get('score_blocked', False)}")
for dimension in payload.get("dimensions", []):
    print(
        f"- {dimension['name']}: score={dimension['score']:.1f} "
        f"passed={dimension['passed']}/{dimension['total']}"
    )
PY
          fi

      - name: Upload fitness artifact
        if: always() && hashFiles('.artifacts/fitness-report.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: fitness-report
          path: .artifacts/fitness-report.json

  # ══════════════════════════════════════════════════════════════
  # SECURITY DIMENSION: 依赖漏洞扫描
  # ══════════════════════════════════════════════════════════════
  dependency-scan:
    name: 'Security: Dependency Scan'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: npm audit (critical)
        run: npm audit --audit-level=critical
        continue-on-error: false

      - name: npm audit (high) - report only
        run: npm audit --audit-level=high || true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: cargo audit
        run: cargo audit
        continue-on-error: true

  # ══════════════════════════════════════════════════════════════
  # SECURITY DIMENSION: Semgrep SAST 扫描
  # ══════════════════════════════════════════════════════════════
  semgrep:
    name: 'Security: Semgrep SAST'
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep scan (security-audit + OWASP)
        run: |
          semgrep scan \
            --config=p/security-audit \
            --config=p/owasp-top-ten \
            --config=p/typescript \
            --config=p/javascript \
            --sarif \
            --output=semgrep-results.sarif \
            .
        continue-on-error: true

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep-results.sarif

      - name: Semgrep strict (ERROR only, fail on match)
        run: |
          semgrep scan \
            --config=p/security-audit \
            --config=p/owasp-top-ten \
            --severity=ERROR \
            --error \
            .

  # ══════════════════════════════════════════════════════════════
  # SECURITY DIMENSION: Trivy 文件系统扫描
  # ══════════════════════════════════════════════════════════════
  trivy:
    name: 'Security: Trivy Scan'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ══════════════════════════════════════════════════════════════
  # SECURITY DIMENSION: Dockerfile 检查
  # ══════════════════════════════════════════════════════════════
  hadolint:
    name: 'Security: Hadolint'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect Dockerfile
        id: dockerfile
        run: |
          if [ -f Dockerfile ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Lint Dockerfile
        if: steps.dockerfile.outputs.exists == 'true'
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error

  # ══════════════════════════════════════════════════════════════
  # SECURITY DIMENSION: 汇总
  # ══════════════════════════════════════════════════════════════
  security-summary:
    name: 'Security Summary'
    runs-on: ubuntu-latest
    needs: [dependency-scan, semgrep, trivy, hadolint]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Defense / Security Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Scan | ${{ needs.dependency-scan.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Semgrep SAST | ${{ needs.semgrep.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy | ${{ needs.trivy.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Hadolint | ${{ needs.hadolint.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
