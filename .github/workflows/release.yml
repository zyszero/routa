name: Routa Release
run-name: >-
  Routa Release ${{
    github.event_name == 'push' && github.ref_name || github.event.inputs.version
  }}${{
    github.event_name == 'workflow_dispatch' &&
    ((github.event.inputs.dry_run == 'true' || github.event.inputs.dry_run == true) && ' [dry-run]' || ' [publish]') ||
    ''
  }}

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semver version to release, ex: 0.2.4 or v0.2.4"
        required: true
        type: string
      dry_run:
        description: "Build and package only without publishing release assets"
        required: false
        default: false
        type: boolean
      publish_cli:
        description: "Publish npm CLI packages"
        required: false
        default: true
        type: boolean
      publish_desktop:
        description: "Publish desktop release assets"
        required: false
        default: true
        type: boolean
      publish_crates:
        description: "Publish Rust crates to crates.io"
        required: false
        default: true
        type: boolean

jobs:
  resolve-version:
    name: Resolve release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [[ -n "${INPUT_VERSION}" ]]; then
            version="${INPUT_VERSION#v}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi

          if [[ -z "${version}" ]]; then
            echo "Unable to resolve release version" >&2
            exit 1
          fi

          echo "value=${version}" >> "$GITHUB_OUTPUT"

  release-desktop:
    name: Release desktop
    needs: resolve-version
    if: |
      github.event_name == 'push' ||
      (
        (github.event.inputs.dry_run == 'false' || github.event.inputs.dry_run == false) &&
        (github.event.inputs.publish_desktop == 'true' || github.event.inputs.publish_desktop == true)
      )
    permissions:
      contents: write
    uses: ./.github/workflows/tauri-release.yml
    with:
      version: ${{ needs.resolve-version.outputs.version }}
    secrets: inherit

  build-desktop:
    name: Build desktop only
    needs: resolve-version
    if: |
      github.event.inputs.dry_run == 'true' ||
      github.event.inputs.dry_run == true
    uses: ./.github/workflows/tauri-build.yml
    with:
      version: ${{ needs.resolve-version.outputs.version }}
    secrets: inherit

  release-cli:
    name: Release CLI
    needs: resolve-version
    if: |
      github.event_name == 'push' ||
      github.event.inputs.dry_run == 'true' ||
      github.event.inputs.dry_run == true ||
      github.event.inputs.publish_cli == 'true' ||
      github.event.inputs.publish_cli == true
    uses: ./.github/workflows/cli-release.yml
    with:
      version: ${{ needs.resolve-version.outputs.version }}
      publish: ${{ github.event_name == 'push' || ((github.event.inputs.dry_run != 'true' && github.event.inputs.dry_run != true) && (github.event.inputs.publish_cli == 'true' || github.event.inputs.publish_cli == true)) }}
    secrets: inherit

  release-crates:
    name: Publish Rust crates
    needs: resolve-version
    if: |
      github.event_name == 'push' ||
      (
        (github.event.inputs.dry_run == 'false' || github.event.inputs.dry_run == false) &&
        (github.event.inputs.publish_crates == 'true' || github.event.inputs.publish_crates == true)
      )
    uses: ./.github/workflows/cargo-release.yml
    with:
      version: ${{ needs.resolve-version.outputs.version }}
      dry_run: false
    secrets: inherit
