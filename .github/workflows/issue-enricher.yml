name: 'Issue Enricher'

on:
  issues:
    types: [opened]

  # Manual trigger for testing
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to analyze'
        required: true
        type: number
      dry_run:
        description: 'Dry run (no comments/labels)'
        required: false
        default: false
        type: boolean
      mention_copilot:
        description: 'Mention @copilot to implement the issue after analysis'
        required: false
        default: false
        type: boolean

permissions:
  issues: write
  contents: read

jobs:
  enrich-issue:
    name: 'Analyze Issue with Claude Code'
    runs-on: ubuntu-latest

    # Only run if the issue was created by the repo owner (for auto-trigger)
    # Always run for manual workflow_dispatch
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.issue.user.login == github.repository_owner

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Determine issue number
        id: issue
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "number=${{ github.event.inputs.issue_number }}" >> $GITHUB_OUTPUT
            echo "dry_run=${{ github.event.inputs.dry_run }}" >> $GITHUB_OUTPUT
            echo "mention_copilot=${{ github.event.inputs.mention_copilot }}" >> $GITHUB_OUTPUT
          else
            echo "number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
            echo "dry_run=false" >> $GITHUB_OUTPUT
            echo "mention_copilot=false" >> $GITHUB_OUTPUT
          fi

      - name: Analyze Issue
        id: analyze
        run: |
          ISSUE_NUMBER="${{ steps.issue.outputs.number }}"
          DRY_RUN="${{ steps.issue.outputs.dry_run }}"
          MENTION_COPILOT="${{ steps.issue.outputs.mention_copilot }}"

          echo "## 🤖 Issue Enricher" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Analyzing issue #${ISSUE_NUMBER}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Build command arguments
          ARGS="--issue $ISSUE_NUMBER"
          if [ "$DRY_RUN" == "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ "$MENTION_COPILOT" == "true" ]; then
            ARGS="$ARGS --mention-copilot"
          fi

          # Run the issue enricher script
          npx tsx scripts/issue-enricher.ts $ARGS 2>&1 | tee /tmp/enricher-output.txt

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Analysis Output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          head -200 /tmp/enricher-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

