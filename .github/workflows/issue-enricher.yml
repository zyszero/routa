name: 'Issue Enricher'

on:
  issues:
    types: [opened]

  # Manual trigger for testing
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to analyze'
        required: true
        type: number
      dry_run:
        description: 'Dry run (no comments/labels)'
        required: false
        default: false
        type: boolean
      assign_copilot:
        description: 'Assign Copilot to implement the issue after analysis'
        required: false
        default: false
        type: boolean

permissions:
  issues: write
  contents: read

jobs:
  enrich-issue:
    name: 'Analyze Issue with Claude Code'
    runs-on: ubuntu-latest

    # Only run if the issue was created by the repo owner (for auto-trigger)
    # Always run for manual workflow_dispatch
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.issue.user.login == github.repository_owner

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Determine issue number
        id: issue
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_ISSUE_NUMBER: ${{ github.event.inputs.issue_number }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
          INPUT_ASSIGN_COPILOT: ${{ github.event.inputs.assign_copilot }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          if [ "$EVENT_NAME" == "workflow_dispatch" ]; then
            echo "number=$INPUT_ISSUE_NUMBER" >> $GITHUB_OUTPUT
            echo "dry_run=$INPUT_DRY_RUN" >> $GITHUB_OUTPUT
            echo "assign_copilot=$INPUT_ASSIGN_COPILOT" >> $GITHUB_OUTPUT
            echo "auto_trigger=false" >> $GITHUB_OUTPUT
          else
            echo "number=$ISSUE_NUMBER" >> $GITHUB_OUTPUT
            echo "dry_run=false" >> $GITHUB_OUTPUT
            echo "assign_copilot=false" >> $GITHUB_OUTPUT
            echo "auto_trigger=true" >> $GITHUB_OUTPUT
          fi

      - name: Check auto-trigger eligibility
        id: eligibility
        env:
          EVENT_NAME: ${{ github.event_name }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          MAX_AUTO_BODY_LENGTH: "200"
        run: |
          if [ "$EVENT_NAME" == "workflow_dispatch" ]; then
            echo "should_analyze=true" >> $GITHUB_OUTPUT
            echo "reason=manual-dispatch" >> $GITHUB_OUTPUT
            exit 0
          fi

          BODY_LENGTH=${#ISSUE_BODY}
          echo "body_length=$BODY_LENGTH" >> $GITHUB_OUTPUT

          if [ "$BODY_LENGTH" -gt "$MAX_AUTO_BODY_LENGTH" ]; then
            echo "should_analyze=false" >> $GITHUB_OUTPUT
            echo "reason=body-too-long" >> $GITHUB_OUTPUT
            {
              echo "## 🤖 Issue Enricher"
              echo ""
              echo "Skipped automatic enrichment because issue body length (${BODY_LENGTH}) exceeds ${MAX_AUTO_BODY_LENGTH} characters."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "should_analyze=true" >> $GITHUB_OUTPUT
          echo "reason=eligible" >> $GITHUB_OUTPUT

      - name: Sync GitHub issues into local docs/issues cache
        if: steps.eligibility.outputs.should_analyze == 'true'
        run: |
          ISSUE_NUMBER="${{ steps.issue.outputs.number }}"
          echo "### Local issue sync" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          npx tsx .github/scripts/sync-github-issues.ts --issue "$ISSUE_NUMBER" 2>&1 | tee /tmp/issue-sync-output.txt
          echo '```' >> $GITHUB_STEP_SUMMARY
          head -80 /tmp/issue-sync-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Analyze Issue
        id: analyze
        if: steps.eligibility.outputs.should_analyze == 'true'
        run: |
          ISSUE_NUMBER="${{ steps.issue.outputs.number }}"
          DRY_RUN="${{ steps.issue.outputs.dry_run }}"
          ASSIGN_COPILOT="${{ steps.issue.outputs.assign_copilot }}"
          AUTO_TRIGGER="${{ steps.issue.outputs.auto_trigger }}"

          echo "## 🤖 Issue Enricher" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Analyzing issue #${ISSUE_NUMBER}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Build command arguments
          ARGS="--issue $ISSUE_NUMBER"
          if [ "$DRY_RUN" == "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ "$ASSIGN_COPILOT" == "true" ]; then
            ARGS="$ARGS --assign-copilot"
          fi
          if [ "$AUTO_TRIGGER" == "true" ]; then
            ARGS="$ARGS --auto-trigger"
          fi

          ARGS="$ARGS --skip-sync"

          # Run the issue enricher script
          npx tsx .github/scripts/issue-enricher.ts $ARGS 2>&1 | tee /tmp/enricher-output.txt

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Analysis Output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          head -200 /tmp/enricher-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
