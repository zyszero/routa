name: 'Markdown Links'

on:
  pull_request:
    paths:
      - '**/*.md'
      - 'scripts/check-markdown-links.sh'
      - 'tools/hook-runtime/src/check-markdown-links.ts'
      - '.github/workflows/markdown-links.yaml'
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - 'scripts/check-markdown-links.sh'
      - 'tools/hook-runtime/src/check-markdown-links.ts'
      - '.github/workflows/markdown-links.yaml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  markdown-external-links:
    name: 'Check Markdown External Links'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check markdown external links
        run: ./scripts/check-markdown-links.sh
